<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>CORE Admin</title>
<link rel="icon" href="/assets/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ui/base.css">
<link rel="stylesheet" href="/ui/platform.css">
<style>
.admin-shell{display:grid;grid-template-columns:230px minmax(0,1fr);min-height:100vh}
.admin-nav{border-right:1px solid var(--line);padding:26px 18px;display:flex;flex-direction:column;gap:6px}
.admin-nav .wordmark{font-size:24px;font-weight:900;letter-spacing:-.06em;margin-bottom:14px}
.admin-nav button{text-align:left;border:0;background:none;font:inherit;font-weight:600;font-size:14px;padding:10px 14px;border-radius:12px;cursor:pointer;color:var(--ink)}
.admin-nav button.is-active,.admin-nav button:hover{background:var(--panel2)}
.admin-main{padding:30px 34px;max-width:1080px}
.admin-main h1{font-size:26px;margin:0 0 4px}
.admin-sub{color:var(--muted);font-size:14px;margin:0 0 22px}
table.admin{width:100%;border-collapse:collapse;font-size:13.5px}
table.admin th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line)}
table.admin td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;word-break:break-word}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin:16px 0 26px}
.stat-card{border:1px solid var(--line);border-radius:14px;padding:16px;background:var(--panel)}
.stat-card b{font-size:24px;display:block}
.stat-card span{font-size:12.5px;color:var(--muted)}
.admin-form{display:grid;gap:10px;max-width:560px;margin:14px 0 26px}
.admin-form input,.admin-form textarea,.admin-form select{font:inherit;font-size:14px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink)}
.admin-actions{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid var(--line)}
.pill.unverified{color:var(--muted)}
.pill.pending{color:#a07a1f}.pill.verified{color:#2c7a4b}.pill.official{color:#5b4bbf}
.mono{font-family:ui-monospace,monospace;font-size:12px}
#gate{display:grid;place-items:center;min-height:100vh;padding:20px;text-align:center}
</style>
</head>
<body>
<div id="gate"><div><h1>CORE Admin</h1><p id="gateMsg">Checking access…</p><p><a href="/?view=login">Sign in</a> · <a href="/">Back to Core Wiki</a></p></div></div>
<div class="admin-shell hidden" id="shell">
  <nav class="admin-nav">
    <div class="wordmark">core<span style="color:var(--muted)">/admin</span></div>
    <button data-section="dashboard" class="is-active">Dashboard</button>
    <button data-section="cores">Cores</button>
    <button data-section="verification">Verification</button>
    <button data-section="reports">Reports</button>
    <button data-section="users">Users</button>
    <button data-section="distributions">Distributions</button>
    <button data-section="audit">Audit log</button>
    <button data-section="outbox">Dev outbox</button>
    <a href="/" style="margin-top:auto;font-size:13px;color:var(--muted);padding:10px 14px;text-decoration:none">← Back to site</a>
  </nav>
  <main class="admin-main" id="main"></main>
</div>
<script type="module" src="/admin/admin.js"></script>
</body>
</html>
