# One-click deploy on Render's free tier for testing.
# Free web services do not support persistent disks, so the SQLite database
# and uploaded files may reset when the service restarts or redeploys.
services:
  - type: web
    name: core-platform
    runtime: docker
    plan: free
    envVars:
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_USERNAME
        value: core_admin
      - key: WALLET_MASTER_KEY
        generateValue: true
      - key: APP_URL
        sync: false
