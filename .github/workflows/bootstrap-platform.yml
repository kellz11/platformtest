name: Install CORE platform

on:
  push:
    branches:
      - main
    paths:
      - ".bootstrap/READY"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct, extract and validate platform
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".bootstrap/READY" ]; then
            echo "Bootstrap marker is not present; nothing to install."
            exit 0
          fi

          parts=(.bootstrap/core-platform.part-*)
          test ${#parts[@]} -eq 12
          cat "${parts[@]}" | base64 --decode > /tmp/core-platform-deploy.tar.gz
          echo "3a78619561dda953cc77298e9a23fefbb9580fd8f3bbc1a9801976f173689798  /tmp/core-platform-deploy.tar.gz" | sha256sum --check
          tar -xzf /tmp/core-platform-deploy.tar.gz -C .
          test -f package.json
          test -f server/index.js
          test -f index.html
          test -f render.yaml
          npm ci
          npm test

      - name: Commit complete platform
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".bootstrap/READY" ]; then
            exit 0
          fi
          rm -rf ".bootstrap" ".github/workflows/bootstrap-platform.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install complete CORE platform"
          git push origin HEAD:main
