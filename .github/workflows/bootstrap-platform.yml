name: Install CORE platform

on:
  push:
    branches:
      - main
    paths:
      - ".bootstrap/READY"
  pull_request:
    types:
      - opened
      - synchronize
  pull_request_target:
    types:
      - opened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify overlay parts
        shell: bash
        run: |
          set -euo pipefail
          test -f .bootstrap/READY
          mapfile -t parts < <(printf '%s\n' .bootstrap/platform-overlay.part-* | sort)
          printf 'Found %s overlay parts\n' "${#parts[@]}"
          printf '%s\n' "${parts[@]}"
          test "${#parts[@]}" -eq 11

      - name: Reconstruct overlay archive
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(printf '%s\n' .bootstrap/platform-overlay.part-* | sort)
          cat "${parts[@]}" > /tmp/platform-overlay.b64
          base64 --decode /tmp/platform-overlay.b64 > /tmp/platform-overlay.tar.gz
          actual="$(sha256sum /tmp/platform-overlay.tar.gz | cut -d' ' -f1)"
          echo "Overlay SHA256: ${actual}"
          test "${actual}" = "0816424e04f29a772006dd15588f90ad55a1752c504f29b0d950a0562dc62ca3"
          tar -tzf /tmp/platform-overlay.tar.gz >/dev/null

      - name: Clone CORE static base
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/kellz11/coretestss.git /tmp/core-base
          tar -C /tmp/core-base --exclude=.git -cf - . | tar -C . -xf -

      - name: Verify static base
        shell: bash
        run: |
          set -euo pipefail
          test -f assets/cores/manifest.json
          test -f taxonomy.js
          test -f ui/graph-data.js
          test -f ui/quiz.js
          test -f assets/logo.jpg
          test -f assets/og-image.png
          test -f local-core-galleries.js
          image_count="$(find assets/cores -type f | wc -l)"
          echo "CORE static asset files: ${image_count}"
          test "${image_count}" -gt 1000

      - name: Apply platform overlay
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/platform-overlay.tar.gz -C .
          test -f package.json
          test -f server/index.js
          test -f admin/index.html
          test -f render.yaml

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test

      - name: Commit complete platform
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .github/workflows/bootstrap-platform.yml
          rm -f INSTALL_REQUEST.md INSTALL_SYNC*
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install complete CORE platform"
          git push origin HEAD:main
