name: Install CORE platform

on:
  push:
    branches:
      - main
    paths:
      - ".bootstrap/READY"
  pull_request:
    types:
      - opened
      - synchronize
  pull_request_target:
    types:
      - opened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify overlay parts
        shell: bash
        run: |
          set -euo pipefail
          test -f .bootstrap/READY
          mapfile -t parts < <(printf '%s\n' .bootstrap/platform-overlay.part-* | sort)
          printf 'Found %s overlay parts\n' "${#parts[@]}"
          printf '%s\n' "${parts[@]}"
          test "${#parts[@]}" -eq 11

      - name: Reconstruct overlay archive
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(printf '%s\n' .bootstrap/platform-overlay.part-* | sort)
          cat "${parts[@]}" > /tmp/platform-overlay.b64
          base64 --decode /tmp/platform-overlay.b64 > /tmp/platform-overlay.tar.gz
          actual="$(sha256sum /tmp/platform-overlay.tar.gz | cut -d' ' -f1)"
          echo "Overlay SHA256: ${actual}"
          test "${actual}" = "0816424e04f29a772006dd15588f90ad55a1752c504f29b0d950a0562dc62ca3"
          tar -tzf /tmp/platform-overlay.tar.gz >/dev/null

      - name: Clone CORE static base
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/kellz11/coretestss.git /tmp/core-base
          tar -C /tmp/core-base --exclude=.git -cf - . | tar -C . -xf -

      - name: Verify static base
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object assets/cores/manifest.json)" = "14a79c07355d51b66394dc597540945864a2fa23"
          test "$(git hash-object taxonomy.js)" = "a622558123c94524db3894b88a53b019b9e2119f"
          test "$(git hash-object ui/graph-data.js)" = "b3a1490fba4b81b2121f9991b8141ed6603e4aa7"
          test "$(git hash-object ui/quiz.js)" = "a3122d9872cc9cdbf4f1c7eedbab59336ea8d962"
          test "$(git hash-object assets/logo.jpg)" = "7db421aa2c82bcdeb2512b30db192d45ebf8c74d"
          test "$(git hash-object assets/og-image.png)" = "783d7a1049b66d199b97bb34807fad8359323985"
          test "$(git hash-object local-core-galleries.js)" = "130ffb353c6557a3eb7293d19d0eac6b74092976"

      - name: Apply platform overlay
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/platform-overlay.tar.gz -C .
          test -f package.json
          test -f server/index.js
          test -f admin/index.html
          test -f render.yaml

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm test

      - name: Commit complete platform
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap .github/workflows/bootstrap-platform.yml INSTALL_REQUEST.md INSTALL_SYNC
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install complete CORE platform"
          git push origin HEAD:main
